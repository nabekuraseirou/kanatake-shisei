<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>市政だより × かなたけの里公園</title>
  <style>
    :root {
      --bg:      #0d0d0d;
      --bg2:     #141414;
      --border:  #2a2a2a;
      --green:   #4caf50;
      --green2:  #81c784;
      --muted:   #555;
      --text:    #ccc;
      --mark:    #33691e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Menlo", "Monaco", "Courier New", monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.7;
      padding: 20px 16px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    #header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 20px;
    }

    #header .logo {
      color: var(--green);
      font-size: 11px;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    #header h1 {
      color: var(--green2);
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    #status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    #status span { color: var(--green); }

    /* ── ARTICLE ── */
    .article {
      border: 1px solid var(--border);
      background: var(--bg2);
      margin-bottom: 16px;
    }

    .article-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .date-badge {
      color: var(--green);
      font-size: 11px;
      white-space: nowrap;
    }

    .date-badge::before { content: "► "; }

    .issue-label {
      color: var(--muted);
      font-size: 11px;
    }

    .source-link {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
    }
    .source-link:hover { color: var(--green2); }

    /* ── MATCH ── */
    .match {
      padding: 10px 12px;
      border-top: 1px dashed var(--border);
    }
    .match:first-child { border-top: none; }

    .match-heading {
      color: var(--green);
      font-size: 11px;
      margin-bottom: 6px;
    }

    .match-context {
      white-space: pre-wrap;
      word-break: break-all;
      color: var(--text);
      background: var(--bg);
      border-left: 2px solid var(--border);
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 12px;
      cursor: text;
    }

    mark {
      background: var(--mark);
      color: #a5d6a7;
      border-radius: 0;
      padding: 0 1px;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    .copy-btn:hover { border-color: var(--green); color: var(--green); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── EMPTY / ERROR ── */
    #no-data {
      color: var(--muted);
      padding: 40px 0;
      text-align: center;
    }

    #no-data::before {
      display: block;
      content: "[ no data ]";
      color: var(--border);
      margin-bottom: 8px;
    }

    /* ── FOOTER ── */
    #footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">KANATAKE-NO-SATO PARK / FUKUOKA CITY NEWSLETTER ARCHIVE</div>
  <div id="status">loading...</div>
</div>

<div id="container"></div>

<div id="footer">福岡市市政だより掲載情報アーカイブ — 毎日10:00 自動更新</div>

<script>
function highlightKeywords(text) {
  const keywords = ["かなたけの里公園", "かなたけの里", "かなたけ"];
  let s = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  keywords.forEach(kw => {
    const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g');
    s = s.replace(re, `<mark>${kw}</mark>`);
  });
  return s;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '[ copied ]';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '[ copy ]';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function load() {
  const statusEl = document.getElementById('status');
  const container = document.getElementById('container');

  try {
    const resp = await fetch('data/articles.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const articles = data.articles || [];
    const lastUpdated = data.last_updated
      ? new Date(data.last_updated).toLocaleString('ja-JP')
      : '---';

    statusEl.innerHTML = `last updated: <span>${lastUpdated}</span> &nbsp;|&nbsp; articles: <span>${articles.length}</span>`;

    if (articles.length === 0) {
      container.innerHTML = '<div id="no-data">スクレイパー実行後に表示されます</div>';
      return;
    }

    articles.forEach(art => {
      const div = document.createElement('div');
      div.className = 'article';

      const header = `
        <div class="article-header">
          <span class="date-badge">${art.date_label}号</span>
          <span class="issue-label">${art.label || ''}</span>
          <a class="source-link" href="${art.source_url}" target="_blank" rel="noopener">[source ↗]</a>
        </div>`;

      const matchesHtml = (art.matches || []).map(m => {
        const id = Math.random().toString(36).slice(2);
        return `
          <div class="match">
            ${m.heading ? `<div class="match-heading">${m.heading}</div>` : ''}
            <div class="match-context" id="ctx-${id}">${highlightKeywords(m.context)}</div>
            <button class="copy-btn" onclick="copyText(document.getElementById('ctx-${id}').innerText, this)">[ copy ]</button>
          </div>`;
      }).join('');

      div.innerHTML = header + matchesHtml;
      container.appendChild(div);
    });

  } catch (e) {
    statusEl.textContent = 'error: ' + e.message;
    console.error(e);
  }
}

load();
</script>
</body>
</html>
