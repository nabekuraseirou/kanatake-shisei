<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ه¸‚و”؟مپ م‚ˆم‚ٹ أ— مپ‹مپھمپںمپ‘مپ®é‡Œه…¬هœ’</title>
  <style>
    :root {
      --green: #3a7d44;
      --light-green: #e8f5e9;
      --border: #c8e6c9;
      --text: #212121;
      --muted: #757575;
      --copy-bg: #f1f8e9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Hiragino Sans", "Meiryo", sans-serif;
      background: #fafafa;
      color: var(--text);
      line-height: 1.7;
      padding: 16px;
    }

    header {
      background: var(--green);
      color: white;
      padding: 20px 24px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    header h1 { font-size: 1.1rem; font-weight: bold; }
    header p  { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }

    #status {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    #no-data {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .article {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .article-header {
      background: var(--light-green);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .date-badge {
      background: var(--green);
      color: white;
      font-size: 0.75rem;
      font-weight: bold;
      padding: 3px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .issue-label {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .source-link {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--green);
      text-decoration: none;
    }
    .source-link:hover { text-decoration: underline; }

    .match {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
    }

    .match + .match {
      border-top: 1px dashed var(--border);
    }

    .match-heading {
      font-size: 0.78rem;
      font-weight: bold;
      color: var(--green);
      margin-bottom: 6px;
    }

    .match-context {
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-break: break-all;
      background: var(--copy-bg);
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: text;
    }

    mark {
      background: #fff176;
      border-radius: 2px;
      padding: 0 1px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: white;
      border: 1px solid var(--border);
      color: var(--green);
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .copy-btn:hover { background: var(--light-green); }
    .copy-btn.copied {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }
  </style>
</head>
<body>

<header>
  <h1>ه¸‚و”؟مپ م‚ˆم‚ٹ أ— مپ‹مپھمپںمپ‘مپ®é‡Œه…¬هœ’</h1>
  <p>ç¦ڈه²،ه¸‚ه¸‚و”؟مپ م‚ˆم‚ٹمپ®وژ²è¼‰وƒ…ه ±م‚¢مƒ¼م‚«م‚¤مƒ–</p>
</header>

<div id="status">èھ­مپ؟è¾¼مپ؟ن¸­...</div>
<div id="container"></div>

<script>
const DATA_URL = './data.json';

function highlightKeywords(text) {
  const keywords = ["مپ‹مپھمپںمپ‘مپ®é‡Œه…¬هœ’", "مپ‹مپھمپںمپ‘مپ®é‡Œ", "مپ‹مپھمپںمپ‘"];
  let escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  keywords.forEach(kw => {
    const re = new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'g');
    escaped = escaped.replace(re, `<mark>${kw}</mark>`);
  });
  return escaped;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'âœ“ م‚³مƒ”مƒ¼و¸ˆمپ؟';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'م‚³مƒ”مƒ¼';
      btn.classList.remove('copied');
    }, 2000);
  });
}

async function load() {
  const statusEl = document.getElementById('status');
  const container = document.getElementById('container');

  try {
    // GitHub Pages مپ‹م‚‰ data/articles.json م‚’èھ­مپ؟è¾¼م‚€
    const resp = await fetch('../data/articles.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    const articles = data.articles || [];
    const lastUpdated = data.last_updated
      ? new Date(data.last_updated).toLocaleString('ja-JP')
      : 'ن¸چوکژ';

    statusEl.textContent = `وœ€çµ‚ه·،ه›‍: ${lastUpdated} ï¼ڈ وژ²è¼‰ن»¶و•°: ${articles.length}هڈ·`;

    if (articles.length === 0) {
      container.innerHTML = '<div id="no-data">وژ²è¼‰è¨کن؛‹مپŒمپ¾مپ مپ‚م‚ٹمپ¾مپ›م‚“م€‚<br>م‚¹م‚¯مƒ¬م‚¤مƒ‘مƒ¼م‚’ه®ںè،Œمپ™م‚‹مپ¨è‡ھه‹•çڑ„مپ«è،¨ç¤؛مپ•م‚Œمپ¾مپ™م€‚</div>';
      return;
    }

    articles.forEach(art => {
      const div = document.createElement('div');
      div.className = 'article';

      const header = `
        <div class="article-header">
          <span class="date-badge">${art.date_label}</span>
          <span class="issue-label">${art.label || ''}</span>
          <a class="source-link" href="${art.source_url}" target="_blank" rel="noopener">هژںو–‡ â†—</a>
        </div>`;

      const matchesHtml = (art.matches || []).map(m => {
        const id = Math.random().toString(36).slice(2);
        return `
          <div class="match">
            ${m.heading ? `<div class="match-heading">${m.heading}</div>` : ''}
            <div class="match-context" id="ctx-${id}">${highlightKeywords(m.context)}</div>
            <button class="copy-btn" onclick="copyText(document.getElementById('ctx-${id}').innerText, this)">م‚³مƒ”مƒ¼</button>
          </div>`;
      }).join('');

      div.innerHTML = header + matchesHtml;
      container.appendChild(div);
    });

  } catch (e) {
    statusEl.textContent = 'مƒ‡مƒ¼م‚؟èھ­مپ؟è¾¼مپ؟م‚¨مƒ©مƒ¼: ' + e.message;
    console.error(e);
  }
}

load();
</script>
</body>
</html>
